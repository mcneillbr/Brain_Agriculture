services:
  # ─── Database ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: postgres        # maintenance DB; brain_agriculture is created by migrate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # ─── Migrations (one-shot) ────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/migrate/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASS}   # migrate script reads DB_PASSWORD
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
    restart: on-failure

  # ─── Backend API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      DB_SSL: false
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - api
    environment:
      PORT: 5000
      # Points the Next.js server-side rewrite proxy to the API container.
      # In production replace with your public API hostname if needed.
      API_URL: http://api:3000
    restart: unless-stopped

volumes:
  pgdata:
